<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <!--
    Favicon-optimised version: square canvas, dark fill edge-to-edge,
    DNA top half, pond bottom half. No wordmark (too small at 16-32px).
  -->
  <defs>
    <radialGradient id="pg" cx="50%" cy="55%" r="60%">
      <stop offset="0%"   stop-color="#22a7d0"/>
      <stop offset="50%"  stop-color="#0e7aab"/>
      <stop offset="100%" stop-color="#052e42"/>
    </radialGradient>
    <radialGradient id="gg" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#4e8c5a"/>
      <stop offset="100%" stop-color="#2a5235"/>
    </radialGradient>
    <filter id="gl" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Full-canvas dark background -->
  <rect width="100" height="100" fill="#071824"/>

  <!-- ── POND ── -->
  <ellipse cx="50" cy="82" rx="44" ry="24" fill="#1a3520" opacity="0.8"/>
  <ellipse cx="50" cy="80" rx="40" ry="22" fill="url(#gg)"/>
  <ellipse cx="50" cy="78" rx="35" ry="18" fill="url(#pg)"/>

  <!-- Ripples centred on pond -->
  <ellipse cx="50" cy="78" rx="26" ry="10" fill="none" stroke="#5bc8f5" stroke-width="0.6" stroke-opacity="0.3"/>
  <ellipse cx="50" cy="78" rx="18" ry="7"  fill="none" stroke="#5bc8f5" stroke-width="0.6" stroke-opacity="0.45"/>
  <ellipse cx="50" cy="78" rx="10" ry="4"  fill="none" stroke="#9de8ff" stroke-width="0.7" stroke-opacity="0.65"/>

  <!-- ── DATA STREAM ── -->
  <line x1="50" y1="46" x2="50" y2="76"
        stroke="#00d4ff" stroke-width="2.2" stroke-linecap="round"
        filter="url(#gl)" opacity="0.85"/>
  <line x1="50" y1="46" x2="50" y2="76"
        stroke="#aaf4ff" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>

  <!-- Particles -->
  <circle cx="50" cy="51" r="1.6" fill="#00ffcc" filter="url(#gl)"/>
  <circle cx="50" cy="58" r="1.4" fill="#00d4ff" filter="url(#gl)" opacity="0.9"/>
  <circle cx="50" cy="65" r="1.5" fill="#00ffcc" filter="url(#gl)" opacity="0.85"/>
  <circle cx="50" cy="72" r="1.3" fill="#aaf4ff" filter="url(#gl)" opacity="0.8"/>

  <!-- Binary digits -->
  <text x="40" y="55" font-family="monospace" font-size="4.5" font-weight="bold" fill="#00ffcc" opacity="0.8" filter="url(#gl)">1</text>
  <text x="40" y="64" font-family="monospace" font-size="4.5" font-weight="bold" fill="#00d4ff" opacity="0.75" filter="url(#gl)">0</text>
  <text x="56" y="59" font-family="monospace" font-size="4.5" font-weight="bold" fill="#00d4ff" opacity="0.75" filter="url(#gl)">0</text>
  <text x="56" y="68" font-family="monospace" font-size="4.5" font-weight="bold" fill="#00ffcc" opacity="0.70" filter="url(#gl)">1</text>

  <!-- Splash -->
  <ellipse cx="50" cy="77" rx="7" ry="2.5" fill="#5bc8f5" opacity="0.55" filter="url(#gl)"/>

  <!-- ── DNA DOUBLE HELIX ── -->
  <!-- Rung outlines -->
  <line x1="36" y1="13" x2="64" y2="13" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="36" y1="24" x2="64" y2="24" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="36" y1="35" x2="64" y2="35" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Strand A outline -->
  <path d="M 50 5 C 40 5,36 9,36 13 C 36 17,44 20,50 18.5 C 56 17,64 20,64 24 C 64 28,56 31,50 29.5 C 44 28,36 31,36 35 C 36 39,44 43,50 46"
        stroke="#000" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Strand B outline -->
  <path d="M 50 5 C 60 5,64 9,64 13 C 64 17,56 20,50 18.5 C 44 17,36 20,36 24 C 36 28,44 31,50 29.5 C 56 28,64 31,64 35 C 64 39,56 43,50 46"
        stroke="#000" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Coloured rungs -->
  <line x1="36" y1="13" x2="64" y2="13" stroke="#e879f9" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="36" y1="24" x2="64" y2="24" stroke="#e879f9" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="36" y1="35" x2="64" y2="35" stroke="#e879f9" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Strand A (purple) -->
  <path d="M 50 5 C 40 5,36 9,36 13 C 36 17,44 20,50 18.5 C 56 17,64 20,64 24 C 64 28,56 31,50 29.5 C 44 28,36 31,36 35 C 36 39,44 43,50 46"
        stroke="#c084fc" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Strand B (pink) -->
  <path d="M 50 5 C 60 5,64 9,64 13 C 64 17,56 20,50 18.5 C 44 17,36 20,36 24 C 36 28,44 31,50 29.5 C 56 28,64 31,64 35 C 64 39,56 43,50 46"
        stroke="#f472b6" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Top cap -->
  <circle cx="50" cy="5" r="2.8" fill="#000"/>
  <circle cx="50" cy="5" r="2"   fill="#e879f9"/>

</svg>
